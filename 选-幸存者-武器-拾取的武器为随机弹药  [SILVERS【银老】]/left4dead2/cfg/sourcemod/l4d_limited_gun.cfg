// 插件由黄向真仇天翻译
// ConVars for plugin "l4d2_limited_gun.smx"


// 武器弹药的随机最大百分比
// -1=游戏默认正常比例的最大值【但也是游戏默认弹药值，使用-1这个参数值时需配合更多弹药插件配合使用】
// -
// Default: "1.0"
limited_gun_ammo_max "1.0"

// 武器弹药的随机最小百分比,
// -1=游戏默认正常比例的最小值【但也是游戏默认弹药值，使用-1这个参数值时需配合更多弹药插件配合使用】
// -
// Default: "0.0"
limited_gun_ammo_min "0.0"


