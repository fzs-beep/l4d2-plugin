// [L4D2] Smart Item Selector by Patriot Games
// Selectively gives items to survivors when they spawn and inlcudes VIP/admin options.
// ConVars for plugin "l4d2_smart_item_selector.smx"


/* ==========  设置 ========== */

// 插件是否已启用? 0=Plugin off, 1=Plugin on.
// -
// Default: "1"
l4d2_sis_enable "1"

// 向每位玩家发送消息，告知他们收到了哪些物品?. 0=off, 1=on.
// -
// Default: "0"
l4d2_sis_info_message "0"

//给出所有武器/物品后装备的武器槽。
//1=初级，2=次级，3=可丢弃，4=健康工具包，5=药物
// -
// Default: "1"
// Minimum: "1"
// Maximum: "5"
l4d2_sis_lastslot "1"

//在提供另一把辅助武器之前，先移除默认手枪？。0=否，1=是。

//消除了另一次发射时手枪掉落的混乱。
// -
// Default: "1"
l4d2_sis_remove_pistol "0"

//具有任何这些标志的幸存者将获得VIP/管理员物品。接受多个标志（例如“abc”）
//[示例管理标志：a=保留，b=通用，c=踢，d=禁止，o=自定义1等]
// -
// Default: "a"
l4d2_sis_vip_flags "a"


// ==========基本项选择==========*/

//给幸存者一个主要武器？
//0=禁用，1=泵式霰弹枪，2=铬式霰弹，3=spas霰弹枪；4=自动喷枪，5=smg，6=smg静音，7=smg mp5，8=M16，9=AK47，10=沙漠步枪，11=SG552，12=狩猎步枪，13=童子军狙击手，14=军用狙击手，15=AWP狙击手
// -
// Default: "0"
l4d2_sis_primary_choice "5"

//给幸存者一个次要武器？
//0=禁用，1=马格南手枪，2=刀（需要[L4C2]刀解锁插件），3=煎锅，4=桶法，5=撬棍，6=板球棒，7=棒球棒，8=砍刀，9=卡塔纳，10=高尔夫球杆，11=火斧，12=电吉他
// -
// Default: "0"
l4d2_sis_secondary_choice "1"

//给幸存者一个健康物品？0=禁用，1=medkit，2=defib
// -
// Default: "0"
l4d2_sis_health_choice "0"

//给幸存者一个0=禁用，1=管道炸弹，2=莫洛托夫，3=胆汁罐
// Default: "0"
l4d2_sis_meds_choice "0"

//给幸存者升级？0=禁用，1=激光，2=燃烧弹药，3=爆炸弹药
// -
// Default: "0"
l4d2_sis_throwable_choice "0"

// Give survivors an Upgrade? 0=disable, 1=laser, 2=incendiary ammo, 3=explosive ammo
// -
// Default: "0"
l4d2_sis_upgrade_choice "0"


//==========随机项目选择==========*/

//给幸存者1个随机的主要武器？覆盖基础主要武器设置 0=禁用 1=启用。
// -
// Default: "0"
l4d2_sis_random_primary "0"

// 给幸存者一个随机的次要武器？覆盖基础辅助武器设置。0=禁用，1=启用。
// -
// Default: "0"
l4d2_sis_random_secondary "1"

//给幸存者一个随机的健康物品？覆盖基本运行状况项设置。0=禁用，1=启用。
// -
// Default: "0"
l4d2_sis_random_health "0"

//给幸存者随机药物？覆盖基本药物设置。0=禁用，1=启用。
// -
// Default: "0"
l4d2_sis_random_meds "0"

//给幸存者随机投掷物？覆盖基本可丢弃设置。0=禁用，1=启用。
// -
// Default: "0"
l4d2_sis_random_throwable "0"

//给幸存者随机升级？覆盖基本升级设置。0=禁用，1=启用。
// -
// Default: "0"
l4d2_sis_random_upgrade "0"


//*============VIP项目选择============*/

//给VIP一个主要武器？覆盖基本和随机主设置。
//0=禁用，1=泵式霰弹枪，2=铬式霰弹，3=spas霰弹枪；4=自动喷枪，5=smg，6=smg静音，7=smg mp5，8=M16，9=AK47，10=沙漠步枪，11=SG552，12=狩猎步枪，13=童子军狙击手，14=军用狙击手，15=AWP狙击手
// -
// Default: "0"
l4d2_sis_vip_primary_choice "0"

//给VIP一个次要武器？替代基本和随机次要设置。
//0=禁用，1=马格南手枪，2=刀（需要[L4C2]刀解锁插件），3=煎锅，4=桶法，5=撬棍，6=板球棒，7=棒球，8=砍刀，9=武士刀，10=高尔夫球杆，11=火斧，12=电吉他
// -
// Default: "0"
l4d2_sis_vip_secondary_choice "0"

//给VIP一个健康物品？覆盖基本和随机健康设置。
//0=禁用，1=medkit，2=defib
// -
// Default: "0"
l4d2_sis_vip_health_choice "0"

//给VIP送药？覆盖基础和随机药物设置。
//0=禁用，1=药丸，2=肾上腺素
// -
// Default: "0"
l4d2_sis_vip_meds_choice "0"

//给VIP一个一次性礼物？覆盖基本和随机丢弃设置。
//0=禁用，1=管道炸弹，2=莫洛托夫，3=胆汁罐
// -
// Default: "0"
l4d2_sis_vip_throwable_choice "0"

//给VIP升级？覆盖基本和随机升级设置。
//0=禁用，1=激光，2=燃烧弹药，3=爆炸弹药
// -
// Default: "0"
l4d2_sis_vip_upgrade_choice "0"