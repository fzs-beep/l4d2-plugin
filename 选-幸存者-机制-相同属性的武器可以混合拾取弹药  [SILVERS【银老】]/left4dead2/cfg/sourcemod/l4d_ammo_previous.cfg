// 由黄向真仇天翻译
// ConVars for plugin "l4d_ammo_previous.smx"


// /0=相同枪支时拾取     1=相同弹药类型时拾取          2=具有自定义列表的相同类型（*_pass_list#）
// -
//默认: "1"
ammo_previous_pass "1"

// 当将*_pass设置为2时，类似的弹药类型列表，默认值：霰弹枪          [需要上面的命令值改为2时才生效当前命令]
// -
// 默认: "7,8"
ammo_previous_pass_list1 "7,8"

// 当将*pass设置为2时，列出类似的弹药类型，默认值：步枪和smgs
// -
// 默认: "3,5"
ammo_previous_pass_list2 "3,5"

// 当*pass设置为2时，列出类似的弹药类型，默认狙击手和m60
// -
// 默认 "9,10,6"
ammo_previous_pass_list3 "9,10,6"

// 允许从枪堆中拾取弹药（产卵点）
// -
// 默认: "1"
ammo_previous_pile "1"


